<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Registrarse — Movitek</title>
<link
	href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
	rel="stylesheet" />
<link rel="stylesheet" th:href="@{/css/indexStyles.css}" />
<link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

	<div class="login-card">

		<div class="login-logo">Movitek</div>
		<h1 class="login-title">Crear cuenta</h1>
		<p class="login-subtitle">Completá el formulario para registrarte.</p>

		<div class="alert-error" th:if="${registerError}">
			✕ &nbsp;<span th:text="${registerError}"></span>
		</div>
		<form th:action="@{/register}" th:object="${compradorForm}"
			method="post">
			<div class="field">
				<label for="nombre">Nombre</label>
				<div class="input-wrap">
					<input id="nombre" type="text" th:field="*{nombre}"
						placeholder="Juan" required />
				</div>
			</div>
			<div class="field">
				<label for="apellido">Apellido</label>
				<div class="input-wrap">
					<input id="apellido" type="text" th:field="*{apellido}"
						placeholder="Pérez" required />
				</div>
			</div>
			<div class="field">
				<label for="email">Correo electrónico</label>
				<div class="input-wrap">
					<input id="email" type="email" th:field="*{email}"
						placeholder="juan@movitek.com" required />
				</div>
			</div>
			<div class="field">
				<label for="contrasenia">Contraseña</label>
				<div class="input-wrap">
					<input id="contrasenia" type="password" th:field="*{contrasenia}"
						placeholder="••••••••" required />
					<button type="button" class="toggle-pw" onclick="togglePassword()">mostrar</button>
				</div>
			</div>
			<div class="field">
				<label for="telefono">Teléfono</label>
				<div class="input-wrap">
					<input id="telefono" type="tel" th:field="*{telefono}"
						placeholder="1123456789" required />
				</div>
			</div>
			<div class="field">
				<label for="direccion">Dirección</label>
				<div class="input-wrap">
					<input id="direccion" type="text" th:field="*{direccion}"
						placeholder="Av. Corrientes 1234" required />
				</div>
			</div>
			<div class="field">
				<label for="codigoPostal">Código postal</label>
				<div class="input-wrap">
					<input id="codigoPostal" type="text" th:field="*{codigoPostal}"
						placeholder="C1043" required />
				</div>
			</div>
			<button type="submit" class="btn-primary btn-login">Crear cuenta &nbsp;→</button>
		</form>

		<p class="divider">
			¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión</a>
		</p>

	</div>

	<script th:src="@{/javascript/login-password.js}"></script>

</body>
</html>
