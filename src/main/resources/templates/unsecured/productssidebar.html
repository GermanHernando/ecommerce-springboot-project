<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sidebar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="productssidebar.css">
</head>
<body>

	<button class="toggle-btn" id="toggleBtn" aria-controls="sidebar" aria-expanded="false" aria-label="Abrir/cerrar menú lateral">☰</button>
	<div class="overlay" id="overlay"></div>

	<aside class="sidebar" id="sidebar">
		<h2 class="sidebar__title">Panel</h2>

		<a href="#" class="sidebar__link"> <svg class="sidebar__icon" viewBox="0 0 24 24" role="img" aria-labelledby="sidebar-home-title">
      <title id="sidebar-home-title">Icono de Inicio</title>
      <path d="M12 3l9 8h-3v9h-12v-9h-3z" />
    </svg> Inicio
		</a> <a href="#" class="sidebar__link"> <svg class="sidebar__icon" viewBox="0 0 24 24" role="img" aria-labelledby="sidebar-profile-title">
      <title id="sidebar-profile-title">Icono de Perfil</title>
      <path
					d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z" />
    </svg> Perfil
		</a> <a href="#" class="sidebar__link"> <svg class="sidebar__icon" viewBox="0 0 24 24" role="img" aria-labelledby="sidebar-settings-title">
      <title id="sidebar-settings-title">Icono de Configuración</title>
      <path
					d="M19.4 13a7.7 7.7 0 000-2l2.1-1.6-2-3.4-2.5 1a7.4 7.4 0 00-1.7-1l-.4-2.6h-4l-.4 2.6a7.4 7.4 0 00-1.7 1l-2.5-1-2 3.4 2.1 1.6a7.7 7.7 0 000 2l-2.1 1.6 2 3.4 2.5-1a7.4 7.4 0 001.7 1l.4 2.6h4l.4-2.6a7.4 7.4 0 001.7-1l2.5 1 2-3.4-2.1-1.6zM12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7z" />
    </svg> Configuración
		</a>
	</aside>

	<main class="content" id="content">
		<h1>Dashboard</h1>
		<p>Sidebar separado en archivos </p>
	</main>


	<script th:src="@{/javascript/productssidebar.js}"></script>
</body>
</html>
