<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="#{productos.page.title}">Productos — MOVITEK</title>

<link rel="stylesheet" th:href="@{/css/indexStyles.css}" />
<link rel="stylesheet" th:href="@{/css/productosStyles.css}" />
<link rel="stylesheet" th:href="@{/css/productssidebar.css}" />
<link rel="stylesheet" th:href="@{/css/footer.css}" />


<link
	href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
	rel="stylesheet" />
</head>

<body>

	<!-- NAVBAR -->
	<div th:replace="~{navbar :: navbar}"></div>

	<!-- BOTÓN MOBILE -->
	<button class="toggle-btn" id="toggleBtn">☰</button>
	<div class="overlay" id="overlay"></div>

	<div class="layout">

		<!-- SIDEBAR -->
		<aside class="sidebar" id="sidebar">
			<h2 class="sidebar__title">Productos</h2>

			<a th:href="@{/productos(tipo='celulares')}"
				th:classappend="${tipoActivo == 'celulares'} ? ' active' : ''"
				class="sidebar__link"> 📱 Celulares </a> <a
				th:href="@{/productos(tipo='cargadores')}"
				th:classappend="${tipoActivo == 'cargadores'} ? ' active' : ''"
				class="sidebar__link"> ⚡ Cargadores </a>
		</aside>

		<!-- CONTENIDO -->
		<main class="content" id="content">

			<!-- Header -->
			<div class="page-header">
				<span class="section-tag" th:text="#{productos.tag}">Catálogo</span>
				<h1 th:text="#{productos.title}">Todos los productos</h1>

				<p class="product-count"
					th:text="#{productos.count(${totalProductos} ?: 0)}">0
					productos disponibles</p>
			</div>

			<!-- 📱 CELULARES -->
			<div th:if="${celulares != null}">

				<div class="products-grid" th:if="${not #lists.isEmpty(celulares)}">
					<div class="product-card" th:each="celular : ${celulares}">

						<div class="product-badge sin-stock"
							th:if="${celular.cantidad == 0}">Sin stock</div>

						<div class="product-img">
							<!-- icono -->
						</div>

						<div class="product-info">
							<span th:text="${celular.marca}"></span>
							<h3 th:text="${celular.nombre}"></h3>

							<div class="product-specs">
								<span th:text="${celular.tamanio} + '&quot;'"></span> <span
									th:text="${celular.ram} + ' GB RAM'"></span> <span
									th:text="${celular.almacenamiento} + ' GB'"></span>
							</div>

							<div class="product-footer">
								<span th:text="${'$' + celular.precio}"></span>

<!-- 								<form th:action="@{/carrito/agregar}" method="post"> -->
<!-- 									<input type="hidden" name="productId" th:value="${celular.id}" /> -->
<!-- 									<button type="submit">+</button> -->
<!-- 								</form> -->
							</div>
						</div>

					</div>
				</div>

				<div th:if="${#lists.isEmpty(celulares)}">No hay celulares
					disponibles</div>

			</div>

			<!-- ⚡ CARGADORES -->
			<div th:if="${cargadores != null}">

				<div class="products-grid" th:if="${not #lists.isEmpty(cargadores)}">
					<div class="product-card" th:each="cargador : ${cargadores}">

						<div class="product-badge carga-rapida"
							th:if="${cargador.cargaRapida}">Carga rápida</div>

						<div class="product-info">
							<span th:text="${cargador.marca}"></span>
							<h3 th:text="${cargador.nombre}"></h3>

							<div class="product-specs">
								<span th:text="${cargador.wats} + 'W'"></span>
							</div>

							<div class="product-footer">
								<span th:text="${'$' + cargador.precio}"></span>

<!-- 								<form th:action="@{/carrito/agregar}" method="post"> -->
<!-- 									<input type="hidden" name="productId" th:value="${cargador.id}" /> -->
<!-- 									<button type="submit">+</button> -->
<!-- 								</form> -->
							</div>
						</div>

					</div>
				</div>

				<div th:if="${#lists.isEmpty(cargadores)}">No hay cargadores disponibles</div>

			</div>

		</main>
	</div>

	<!-- FOOTER -->
	<div th:replace="~{unsecured/footer :: footer}"></div>

	<script src="/javascript/productssidebar.js"></script>

</body>
</html>
