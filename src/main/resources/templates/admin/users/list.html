<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="#{page.title}">MOVITEK — Tienda de Celulares</title>
<link rel="stylesheet" th:href="@{/css/indexStyles.css}" />
<link rel="stylesheet" th:href="@{/css/adminUsers.css}" />
<link
	href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
	rel="stylesheet" />
</head>
<body>

	<!-- NAVBAR -->
	<div th:replace="~{navbar :: navbar}"></div>

	<!-- SECCIÓN USUARIOS -->
	<section class="admin-users-section">
		<div class="admin-users-container">
			<h2 class="admin-users-title">Gestión de Usuarios</h2>

			<!-- TABLA DE USUARIOS -->
			<div class="users-table-wrapper" th:if="${!#lists.isEmpty(listado)}">
				<table class="users-table">
					<thead>
						<tr>
							<th th:text = "#{col.id}"></th>
							<th th:text = "#{col.email}"></th>
							<th th:text = "#{col.password}"></th>
							<!-- <th>Rol</th> -->
							<th th:text = "#{col.actions}"></th>
							
						</tr>
					</thead>
					<tbody>
						<tr th:each="user : ${listado}">
							<td class="user-id" th:text="${user.id}"></td>
							<td th:text="${user.email}"></td>
							<td class="user-password" th:text="${user.contrasenia}">••••••••</td>
							<td>
							<a th:href="@{/admin/users/edit(id=${user.id})}" th:text="#{user.edit.btn}"></a> 
							</td>
							 <!--  <td class="user-role"><span class="badge"th:text="${user.rol}"
								th:classappend="${user.rol == 'ADMIN'} ? 'badge--admin' : 'badge--user'">ROL </span></td>
							<td class="user-actions">
								<a th:href="@{/admin/users/edit/{id}(id=${user.id})}"class="btn-edit"> Editar </a> 
								
								<form th:action="@{/admin/users/eliminate/{id}{id}(id=${user.id})}"method="post"
									onsubmit="return confirm('¿Estás seguro de que querés eliminar este usuario?')">
									<input type="hidden" th:name="${_csrf.parameterName}"
										th:value="${_csrf.token}" />
									<button type="submit" class="btn-delete">Eliminar</button>
								</form>
							</td>
								-->
						</tr>
					</tbody>
				</table>
			</div>
			<!-- Mensaje si no hay usuarios -->
			<p class="users-empty" th:if="${#lists.isEmpty(listado)}">No hay
				usuarios registrados.</p>

		</div>
	</section>

	<!-- FOOTER -->
	<div th:replace="~{footer :: footer}"></div>
