<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Iniciar sesión — Movitek</title>
<link
	href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
	rel="stylesheet" />
<link rel="stylesheet" th:href="@{/css/indexStyles.css}" />
<link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

	<div class="login-card">
		<div class="login-logo">Movitek</div>
		<h1 class="login-title">Bienvenido</h1>
		<p class="login-subtitle">Ingresá tus credenciales para continuar.</p>

		<!-- Error desde el controlador -->
		<div class="alert-error" th:if="${error}">
			✕ &nbsp;<span th:text="${error}"></span>
		</div>
		<form th:action="@{/login}" method="post">
			<div class="field">
				<label for="email"></label>
				<div class="input-wrap">
					<input id="email" type="email" name="email"
						th:classappend="${error} ? 'is-invalid'"
						placeholder="usuario@movitek.com" autocomplete="email" required />
				</div>
			</div>
			<div class="field">
				<label for="password"></label>
				<div class="input-wrap">
					<input id="password" type="password" name="password"
						th:classappend="${error} ? 'is-invalid'" placeholder="••••••••"
						autocomplete="current-password" required />
					<button type="button" class="toggle-pw" onclick="togglePassword()">mostrar</button>
				</div>
			</div>
			<button type="submit" class="btn-primary btn-login">Iniciar
				sesión &nbsp;→</button>
		</form>
		<p class="divider">
			¿No tenés cuenta? <a th:href="@{/register}">Registrate</a>
		</p>
	</div>

	<script th:src="@{/javascript/login-password.js}"></script>

</body>
</html>
